{{define "content"}}
<div class="login-wrap">
  <div class="card login-card">
    <h2>Ingresar al panel</h2>
    {{if .Failed}}<div class="flash" style="color:var(--danger);background:var(--danger-soft);border-color:var(--danger)">Credenciales inválidas. Inténtalo de nuevo.</div>{{end}}
    <form method="post" action="/admin/login">
      <div class="field">
        <label for="user">Usuario</label>
        <input id="user" name="user" autocomplete="username" autofocus required>
      </div>
      <div class="field">
        <label for="pass">Contraseña</label>
        <input id="pass" name="pass" type="password" autocomplete="current-password" required>
      </div>
      <button type="submit" style="width:100%">Entrar</button>
    </form>
  </div>
</div>
{{end}}
